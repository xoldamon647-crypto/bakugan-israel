  <style>
    .wiki-layout { display: grid; grid-template-columns: 260px 1fr; gap: 2rem; align-items: start; }
    .wiki-nav { position: sticky; top: calc(var(--nav-height) + 1rem); background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; }
    .wiki-nav-title { font-size: 0.82rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-secondary); margin-bottom: 1rem; }
    .wiki-nav-item { display: flex; align-items: center; gap: 0.6rem; padding: 0.6rem 0.75rem; border-radius: 8px; cursor: pointer; font-size: 0.9rem; transition: var(--transition); color: var(--text-secondary); }
    .wiki-nav-item:hover, .wiki-nav-item.active { background: rgba(255,102,0,0.1); color: var(--accent); }
    .wiki-content-area { min-width: 0; }
    .wiki-page-header { margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
    .wiki-page-title { font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem; }
    .wiki-page-meta { font-size: 0.85rem; color: var(--text-secondary); }
    .wiki-back { display: inline-flex; align-items: center; gap: 0.4rem; color: var(--accent); cursor: pointer; font-size: 0.9rem; margin-bottom: 1.5rem; }
    @media (max-width: 800px) { .wiki-layout { grid-template-columns: 1fr; } .wiki-nav { position: static; } }
  </style>
</head>

    <div class="container" style="padding-top:2rem;padding-bottom:4rem">
      <!-- Season cards (shown first) -->
      <div id="wiki-home">
        <div class="section-header" style="margin-bottom:2rem">
          <h2 class="section-title">עונות <span>הסדרה</span></h2>
          <p class="section-desc">בחר עונה כדי לקרוא מידע מפורט</p>
        </div>
        <div class="wiki-seasons" id="seasons-grid"><div class="spinner"></div></div>

        <div class="divider"></div>
        <div class="section-header" style="margin-bottom:1.5rem">
          <h2 class="section-title">דמויות, <span>בקוגן ועוד</span></h2>
          <p class="section-desc">דפי דמויות מכל עונות הסדרה – לוחמים, נבלים ובקוגן</p>
        </div>
        <div id="all-pages-grid" style="display:block"></div>

        <div id="admin-wiki-btn" class="hidden" style="text-align:center;margin-top:2rem">
          <button class="btn btn-primary" onclick="openModal('create-page-modal')">+ הוסף דף ויקי</button>
        </div>
      </div>

      <!-- Page view -->
      <div id="wiki-page-view" class="hidden">
        <div class="wiki-layout">
          <div class="wiki-nav">
            <div class="wiki-nav-title">📚 ניווט</div>
            <div id="wiki-nav-items"></div>
          </div>
          <div class="wiki-content-area">
            <div class="wiki-back" onclick="showHome()">← חזרה לכל הדפים</div>
            <div class="wiki-page-header">
              <h1 class="wiki-page-title" id="page-title"></h1>
              <div class="wiki-page-meta" id="page-meta"></div>
            </div>
            <div class="wiki-content" id="page-content"></div>
            <div id="edit-page-btn" class="hidden" style="margin-top:2rem">
              <button class="btn btn-sm btn-outline" onclick="openEditModal()">✏️ ערוך דף</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Create Page Modal -->
  <div class="modal-overlay" id="create-page-modal">
    <div class="modal" style="max-width:700px">
      <div class="modal-header">
        <h3 class="modal-title">📝 דף ויקי חדש</h3>
        <button class="modal-close" onclick="closeModal('create-page-modal')">✕</button>
      </div>
      <div class="modal-body">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
          <div class="form-group"><label class="form-label">Slug (URL)</label><input id="page-slug" class="form-input" placeholder="season-5" dir="ltr"></div>
          <div class="form-group"><label class="form-label">כותרת</label><input id="page-title-input" class="form-input" placeholder="שם הדף"></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
          <div class="form-group"><label class="form-label">עונה (0=כללי)</label><input type="number" id="page-season" class="form-input" value="0" min="0"></div>
          <div class="form-group"><label class="form-label">קטגוריה</label>
            <select id="page-category" class="form-input">
              <option value="seasons">עונות</option>
              <option value="characters">דמויות</option>
              <option value="bakugan">בקוגן</option>
              <option value="general">כללי</option>
            </select>
          </div>
        </div>
        <div class="form-group"><label class="form-label">תוכן (HTML)</label><textarea id="page-content-input" class="form-input" rows="10" placeholder="<h2>...</h2><p>...</p>" dir="rtl"></textarea></div>
        <div id="page-error" class="form-error hidden"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('create-page-modal')">ביטול</button>
        <button class="btn btn-primary" onclick="createPage()">שמור דף</button>
      </div>
    </div>
  </div>

  <footer class="footer"><div class="container"><div class="footer-bottom"><p>© 2026 בקוגן ישראל</p></div></div></footer>
