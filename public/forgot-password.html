<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>שכחתי סיסמה – בקוגן ישראל</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar" id="navbar"></nav>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="ball">🔑</div>
        <h1 class="auth-title">שכחת סיסמה?</h1>
        <p class="auth-subtitle">הכנס את האימייל שלך ונשלח לך קישור לאיפוס</p>
      </div>

      <div id="success-msg" class="hidden" style="background:rgba(0,204,68,0.1);border:1px solid rgba(0,204,68,0.3);border-radius:var(--radius);padding:1rem;text-align:center;color:#00CC44;margin-bottom:1rem">
        ✅ אם האימייל קיים במערכת, שלחנו קישור לאיפוס. בדוק את תיבת הדואר שלך.
      </div>

      <form id="forgot-form">
        <div class="form-group">
          <label class="form-label" for="email">אימייל</label>
          <input type="email" id="email" class="form-input" placeholder="your@email.com" required>
        </div>
        <div id="error-msg" class="form-error hidden"></div>
        <button type="submit" class="btn btn-primary w-full mt-2" id="submit-btn">שלח קישור לאיפוס</button>
      </form>

      <div class="form-divider">או</div>
      <a href="/login" class="btn btn-secondary w-full">חזרה לכניסה</a>
    </div>
  </div>

  <script src="/js/main.js"></script>
  <script>
    document.getElementById('forgot-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errEl = document.getElementById('error-msg');
      errEl.classList.add('hidden');
      btn.disabled = true; btn.textContent = 'שולח...';

      try {
        await apiFetch('/auth/forgot-password', {
          method: 'POST',
          body: { email: document.getElementById('email').value.trim() }
        });
        document.getElementById('forgot-form').classList.add('hidden');
        document.getElementById('success-msg').classList.remove('hidden');
      } catch(err) {
        errEl.textContent = '⚠️ ' + err.message;
        errEl.classList.remove('hidden');
        btn.disabled = false; btn.textContent = 'שלח קישור לאיפוס';
      }
    });
  </script>
</body>
</html>
