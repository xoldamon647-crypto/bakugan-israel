    .forums-layout { display: grid; grid-template-columns: 1fr 300px; gap: 1.5rem; align-items: start; }
    .forum-sidebar { position: sticky; top: calc(var(--nav-height) + 1rem); }
    .sidebar-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
    .sidebar-title { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-secondary); margin-bottom: 1rem; }
    .top-poster { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0; border-bottom: 1px solid var(--border); }
    .top-poster:last-child { border-bottom: none; }
    .top-poster .avatar-sm { flex-shrink: 0; }
    .top-poster-name { font-weight: 600; font-size: 0.9rem; }
    .top-poster-count { font-size: 0.8rem; color: var(--text-secondary); }
    .forum-main { min-width: 0; }
    @media (max-width: 900px) { .forums-layout { grid-template-columns: 1fr; } .forum-sidebar { position: static; } }

    <div class="container section-sm" style="padding-top:2rem">
      <!-- Threads view (hidden initially) -->
      <div id="threads-view" class="hidden">
        <div class="flex items-center gap-2 mb-3">
          <button onclick="showCategories()" class="btn btn-sm btn-secondary">← חזרה לקטגוריות</button>
          <h2 id="current-category-name" style="font-size:1.2rem;font-weight:700"></h2>
        </div>
        <div class="flex items-center justify-between mb-3">
          <div id="threads-count" class="text-muted text-sm"></div>
          <button onclick="openNewThread()" class="btn btn-sm btn-primary" id="new-thread-btn">+ שרשור חדש</button>
        </div>
        <div id="threads-list" class="thread-list"></div>
        <div id="threads-pagination" class="pagination"></div>
      </div>

      <!-- Categories + sidebar -->
      <div id="categories-view">
        <div class="forums-layout">
          <div class="forum-main">
            <div class="flex items-center justify-between mb-3">
              <h2 style="font-size:1.3rem;font-weight:800">קטגוריות הפורום</h2>
              <button onclick="openNewThread()" class="btn btn-sm btn-primary" id="new-thread-main-btn">+ פוסט חדש</button>
            </div>
            <div id="categories-list" class="forum-grid"><div class="spinner"></div></div>
          </div>
          <div class="forum-sidebar">
            <div class="sidebar-card">
              <div class="sidebar-title">📊 סטטיסטיקות</div>
              <div id="forum-stats" style="display:flex;flex-direction:column;gap:0.5rem"></div>
            </div>
            <div class="sidebar-card">
              <div class="sidebar-title">🏅 פוסטים אחרונים</div>
              <div id="recent-threads-sidebar"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

  <!-- New Thread Modal -->
  <div class="modal-overlay" id="new-thread-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">📝 שרשור חדש</h3>
        <button class="modal-close" onclick="closeModal('new-thread-modal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">קטגוריה</label>
          <select id="new-thread-cat" class="form-input">
            <option value="">בחר קטגוריה...</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">כותרת</label>
          <input type="text" id="new-thread-title" class="form-input" placeholder="כותרת השרשור..." maxlength="150">
        </div>
        <div class="form-group">
          <label class="form-label">תוכן</label>
          <textarea id="new-thread-content" class="form-input" rows="6" placeholder="כתוב את הפוסט שלך..."></textarea>
        </div>
        <div id="thread-error" class="form-error hidden"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('new-thread-modal')">ביטול</button>
        <button class="btn btn-primary" onclick="submitThread()">פרסם שרשור</button>
      </div>
    </div>
  </div>
