<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>כניסה – בקוגן ישראל</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar" id="navbar"></nav>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="ball">🌀</div>
        <h1 class="auth-title">ברוך הבא!</h1>
        <p class="auth-subtitle">היכנס לחשבונך בבקוגן ישראל</p>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="email">אימייל</label>
          <input type="email" id="email" class="form-input" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">סיסמה</label>
          <input type="password" id="password" class="form-input" placeholder="••••••••" required>
        </div>
        <div id="error-msg" class="form-error hidden"></div>
        <button type="submit" class="btn btn-primary w-full mt-2" id="submit-btn">כניסה 🔑</button>
      </form>

      <div class="form-divider">או</div>
      <p style="text-align:center;color:var(--text-secondary);font-size:0.9rem">
        אין לך חשבון? <a href="/register" style="color:var(--accent);font-weight:600">הירשם עכשיו</a>
      </p>

      <div class="mt-3" style="text-align:center;font-size:0.85rem;color:var(--text-secondary)">
        <a href="/forgot-password" style="color:var(--accent)">שכחת סיסמה?</a>
      </div>
    </div>
  </div>

  <script src="/js/main.js"></script>
  <script>
    if (Auth.isLoggedIn()) window.location.href = '/';

    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errEl = document.getElementById('error-msg');
      errEl.classList.add('hidden');
      btn.disabled = true; btn.textContent = 'מתחבר...';
      try {
        const data = await apiFetch('/auth/login', {
          method: 'POST',
          body: { email: document.getElementById('email').value, password: document.getElementById('password').value }
        });
        Auth.setAuth(data.token, data.user);
        showToast('כניסה בוצעה בהצלחה! 🎉', 'success');
        setTimeout(() => window.location.href = '/', 800);
      } catch(err) {
        errEl.textContent = '⚠️ ' + err.message;
        errEl.classList.remove('hidden');
        btn.disabled = false; btn.textContent = 'כניסה 🔑';
      }
    });
  </script>
</body>
</html>
