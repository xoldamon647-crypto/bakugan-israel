  <style>
    .events-filters { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 2rem; }
    .filter-btn {
      padding: 0.5rem 1.25rem; border-radius: 50px;
      background: var(--bg-card); border: 1px solid var(--border);
      color: var(--text-secondary); font-weight: 600; font-size: 0.88rem;
      cursor: pointer; transition: var(--transition);
    }
    .filter-btn.active, .filter-btn:hover { background: var(--accent); border-color: var(--accent); color: white; }
    .apply-modal-event-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 1.25rem; }
    .event-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
    .event-detail-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; }
    .event-detail-label { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 0.3rem; }
    .event-detail-value { font-weight: 600; }
    .participants-list { display: flex; flex-direction: column; gap: 0.4rem; max-height: 200px; overflow-y: auto; }
    .participant-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.4rem 0.75rem; background: var(--bg-card); border-radius: 6px; font-size: 0.88rem; }
    @media (max-width: 600px) { .event-detail-grid { grid-template-columns: 1fr; } }
  </style>
</head>

    <div class="container section-sm">
      <div class="flex items-center justify-between mb-3" style="flex-wrap:wrap;gap:1rem">
        <div class="events-filters">
          <div class="filter-btn active" data-filter="all">הכל</div>
          <div class="filter-btn" data-filter="upcoming">קרובים</div>
          <div class="filter-btn" data-filter="ongoing">בתהליך</div>
          <div class="filter-btn" data-filter="completed">הסתיימו</div>
        </div>
        <button class="btn btn-sm btn-primary hidden" id="add-event-btn" onclick="openModal('create-event-modal')">+ אירוע חדש</button>
      </div>
      <div id="events-grid" class="events-grid"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- Event Detail Modal -->
  <div class="modal-overlay" id="event-detail-modal">
    <div class="modal" style="max-width:680px">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-event-title">פרטי אירוע</h3>
        <button class="modal-close" onclick="closeModal('event-detail-modal')">✕</button>
      </div>
      <div class="modal-body" id="modal-event-body"></div>
    </div>
  </div>

  <!-- Apply Modal -->
  <div class="modal-overlay" id="apply-modal">
    <div class="modal" style="max-width:460px">
      <div class="modal-header">
        <h3 class="modal-title">📝 הרשמה לאירוע</h3>
        <button class="modal-close" onclick="closeModal('apply-modal')">✕</button>
      </div>
      <div class="modal-body">
        <p id="apply-event-name" class="apply-modal-event-title"></p>
        <div class="form-group">
          <label class="form-label">שמך המלא <span style="color:var(--accent)">*</span></label>
          <input type="text" id="apply-name" class="form-input" placeholder="שם מלא...">
        </div>
        <div class="form-group">
          <label class="form-label">האם תגיע?</label>
          <select id="apply-coming" class="form-input">
            <option value="1">כן, אגיע! 🎮</option>
            <option value="0">לא בטוח / לא אגיע</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">הערות (אופציונלי)</label>
          <input type="text" id="apply-notes" class="form-input" placeholder="הערות נוספות...">
        </div>
        <div id="apply-error" class="form-error hidden"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('apply-modal')">ביטול</button>
        <button class="btn btn-primary" onclick="submitApply()">הרשם לאירוע 🏆</button>
      </div>
    </div>
  </div>

  <!-- Create Event Modal (admin) -->
  <div class="modal-overlay" id="create-event-modal">
    <div class="modal" style="max-width:560px">
      <div class="modal-header">
        <h3 class="modal-title">➕ יצירת אירוע חדש</h3>
        <button class="modal-close" onclick="closeModal('create-event-modal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group"><label class="form-label">שם האירוע</label><input id="ev-title" class="form-input" placeholder="טורניר..."></div>
        <div class="form-group"><label class="form-label">תיאור</label><textarea id="ev-desc" class="form-input" rows="3" placeholder="תיאור האירוע..."></textarea></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
          <div class="form-group"><label class="form-label">תאריך ושעה</label><input type="datetime-local" id="ev-date" class="form-input"></div>
          <div class="form-group"><label class="form-label">מקום</label><input id="ev-location" class="form-input" placeholder="עיר / כתובת..."></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
          <div class="form-group"><label class="form-label">מספר משתתפים מקס</label><input type="number" id="ev-max" class="form-input" placeholder="0 = ללא הגבלה" min="0"></div>
          <div class="form-group"><label class="form-label">סוג אירוע</label>
            <select id="ev-type" class="form-input">
              <option value="tournament">טורניר</option>
              <option value="casual">משחק ידידותי</option>
              <option value="league">ליגה</option>
              <option value="exhibition">תערוכה</option>
            </select>
          </div>
        </div>
        <div class="form-group"><label class="form-label">פרס 🏆</label><input id="ev-prize" class="form-input" placeholder="פרס / כרטיסים..."></div>
        <div id="create-ev-error" class="form-error hidden"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('create-event-modal')">ביטול</button>
        <button class="btn btn-primary" onclick="createEvent()">צור אירוע</button>
      </div>
    </div>
  </div>

  <footer class="footer"><div class="container"><div class="footer-bottom"><p>© 2026 בקוגן ישראל</p></div></div></footer>
