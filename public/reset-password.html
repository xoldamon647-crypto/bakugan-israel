<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>איפוס סיסמה – בקוגן ישראל</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar" id="navbar"></nav>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="ball">🔐</div>
        <h1 class="auth-title">איפוס סיסמה</h1>
        <p class="auth-subtitle">הכנס סיסמה חדשה לחשבונך</p>
      </div>

      <div id="invalid-msg" class="hidden" style="background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.3);border-radius:var(--radius);padding:1rem;text-align:center;color:#e74c3c;margin-bottom:1rem">
        ❌ קישור לא תקף או פג תוקף. <a href="/forgot-password" style="color:var(--accent)">בקש קישור חדש</a>
      </div>

      <div id="success-msg" class="hidden" style="background:rgba(0,204,68,0.1);border:1px solid rgba(0,204,68,0.3);border-radius:var(--radius);padding:1rem;text-align:center;color:#00CC44;margin-bottom:1rem">
        ✅ הסיסמה שונתה בהצלחה! <a href="/login" style="color:var(--accent)">כנס לחשבון</a>
      </div>

      <form id="reset-form">
        <div class="form-group">
          <label class="form-label" for="password">סיסמה חדשה</label>
          <input type="password" id="password" class="form-input" placeholder="לפחות 6 תווים" required minlength="6">
        </div>
        <div class="form-group">
          <label class="form-label" for="password2">אישור סיסמה</label>
          <input type="password" id="password2" class="form-input" placeholder="חזור על הסיסמה" required>
        </div>
        <div id="error-msg" class="form-error hidden"></div>
        <button type="submit" class="btn btn-primary w-full mt-2" id="submit-btn">שנה סיסמה</button>
      </form>
    </div>
  </div>

  <script src="/js/main.js"></script>
  <script>
    const token = new URLSearchParams(location.search).get('token');
    if (!token) {
      document.getElementById('reset-form').classList.add('hidden');
      document.getElementById('invalid-msg').classList.remove('hidden');
    }

    document.getElementById('reset-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errEl = document.getElementById('error-msg');
      errEl.classList.add('hidden');

      const password = document.getElementById('password').value;
      const password2 = document.getElementById('password2').value;

      if (password !== password2) {
        errEl.textContent = '⚠️ הסיסמאות אינן תואמות';
        errEl.classList.remove('hidden'); return;
      }

      btn.disabled = true; btn.textContent = 'משנה...';
      try {
        await apiFetch('/auth/reset-password', { method: 'POST', body: { token, password } });
        document.getElementById('reset-form').classList.add('hidden');
        document.getElementById('success-msg').classList.remove('hidden');
      } catch(err) {
        errEl.textContent = '⚠️ ' + err.message;
        errEl.classList.remove('hidden');
        btn.disabled = false; btn.textContent = 'שנה סיסמה';
      }
    });
  </script>
</body>
</html>
