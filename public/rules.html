    <div class="container" style="padding-top:2rem;padding-bottom:4rem">
      <div class="rules-intro">
        <div style="font-size:2.5rem;margin-bottom:1rem">🎮</div>
        <h2 style="font-size:1.5rem;font-weight:800;margin-bottom:0.75rem">ברוכים הבאים לדף החוקים</h2>
        <p>כאן תמצא את חוקי המשחק המלאים לכל עונות בקוגן. הכללים מחולקים לפי עונה ולפי נושא. המנהלים מעדכנים את הדף כשישנן תוספות.</p>
      </div>

      <div class="flex items-center justify-between mb-3" style="flex-wrap:wrap;gap:1rem">
        <div class="rules-seasons" id="season-tabs"></div>
        <button class="btn btn-sm btn-primary hidden" id="add-rule-btn" onclick="openModal('add-rule-modal')">+ הוסף כלל</button>
      </div>

      <div id="rules-content"><div class="spinner"></div></div>
    </div>

  <!-- Add Rule Modal (admin) -->
  <div class="modal-overlay" id="add-rule-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">📜 הוספת כלל חדש</h3>
        <button class="modal-close" onclick="closeModal('add-rule-modal')">✕</button>
      </div>
      <div class="modal-body">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
          <div class="form-group"><label class="form-label">מספר עונה</label><input type="number" id="rule-season" class="form-input" value="0" min="0" max="10"></div>
          <div class="form-group"><label class="form-label">שם עונה</label><input id="rule-season-name" class="form-input" placeholder="Battle Brawlers / כללי..."></div>
        </div>
        <div class="form-group"><label class="form-label">כותרת הכלל</label><input id="rule-title" class="form-input" placeholder="כותרת..."></div>
        <div class="form-group"><label class="form-label">תוכן הכלל (HTML)</label><textarea id="rule-content" class="form-input" rows="6" placeholder="<p>...</p><ol>...</ol>"></textarea></div>
        <div id="rule-error" class="form-error hidden"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('add-rule-modal')">ביטול</button>
        <button class="btn btn-primary" onclick="submitRule()">שמור כלל</button>
      </div>
    </div>
  </div>

  <footer class="footer"><div class="container"><div class="footer-bottom"><p>© 2026 בקוגן ישראל</p></div></div></footer>
  <script src="/js/main.js"></script>
  <script>
    let allRules = [], activeSeason = null;

    async function loadRules() {
      try {
        allRules = await apiFetch('/rules');
        renderTabs();
        renderRules();
        if (Auth.isAdmin()) document.getElementById('add-rule-btn').classList.remove('hidden');
      } catch(e) {
        document.getElementById('rules-content').innerHTML = `<div class="no-rules">${e.message}</div>`;
      }
    }

    function renderTabs() {
      const tabs = document.getElementById('season-tabs');
      tabs.innerHTML = `<div class="season-tab active" data-season="all" onclick="filterSeason(null, this)">הכל</div>` +
        allRules.map(s => `<div class="season-tab" data-season="${s.season}" onclick="filterSeason(${s.season}, this)">${s.season_name}</div>`).join('');
    }

    function filterSeason(season, el) {
      activeSeason = season;
      document.querySelectorAll('.season-tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      renderRules();
    }

    function renderRules() {
      const container = document.getElementById('rules-content');
      const toShow = activeSeason === null ? allRules : allRules.filter(s => s.season === activeSeason);

      if (!toShow.length) {
        container.innerHTML = '<div class="no-rules">📜 אין חוקים עדיין. המנהל יוסיף בקרוב!</div>';
        return;
      }

      container.innerHTML = toShow.map(seasonGroup => `
        <div class="rules-section">
          <div class="rules-section-title">
            📜 ${seasonGroup.season_name}
            <span style="font-size:0.8rem;background:rgba(255,102,0,0.1);color:var(--accent);padding:0.15rem 0.6rem;border-radius:4px;font-weight:500">${seasonGroup.rules.length} כללים</span>
          </div>
          ${seasonGroup.rules.map(r => `
            <div class="rule-accordion" id="rule-${r.id}">
              <div class="rule-header" onclick="toggleRule(${r.id})">
                <span>${r.title}</span>
                <span style="display:flex;align-items:center;gap:0.5rem">
                  ${Auth.isAdmin() ? `<button class="btn btn-sm btn-danger btn-icon" onclick="deleteRule(event,${r.id})">🗑️</button>` : ''}
                  <span class="chevron">▼</span>
                </span>
              </div>
              <div class="rule-body" id="rule-body-${r.id}">${r.content}</div>
            </div>
          `).join('')}
        </div>
      `).join('');
    }

    function toggleRule(id) {
      const acc = document.getElementById(`rule-${id}`);
      const body = document.getElementById(`rule-body-${id}`);
      acc.classList.toggle('open');
      body.classList.toggle('show');
    }

    async function deleteRule(e, id) {
      e.stopPropagation();
      if (!confirm('למחוק כלל זה?')) return;
      try {
        await apiFetch(`/rules/${id}`, { method: 'DELETE' });
        showToast('נמחק', 'info');
        loadRules();
      } catch(e2) { showToast(e2.message, 'error'); }
    }

    async function submitRule() {
      const season = parseInt(document.getElementById('rule-season').value);
      const season_name = document.getElementById('rule-season-name').value.trim();
      const title = document.getElementById('rule-title').value.trim();
      const content = document.getElementById('rule-content').value.trim();
      const errEl = document.getElementById('rule-error');
      errEl.classList.add('hidden');
      if (!season_name || !title || !content) { errEl.textContent = '⚠️ כל השדות נדרשים'; errEl.classList.remove('hidden'); return; }
      try {
        await apiFetch('/rules', { method: 'POST', body: { season, season_name, title, content } });
        showToast('כלל נוסף!', 'success');
        closeModal('add-rule-modal');
        loadRules();
      } catch(e2) { errEl.textContent = '⚠️ ' + e2.message; errEl.classList.remove('hidden'); }
    }

    loadRules();
  </script>
