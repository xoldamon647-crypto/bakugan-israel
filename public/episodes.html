  <style>
    /* ── Season tabs ── */
    .ep-season-tabs {
      display: flex; gap: 0.75rem; flex-wrap: wrap;
      margin-bottom: 2rem;
    }
    .ep-season-tab {
      display: flex; flex-direction: column; align-items: center;
      gap: 0.2rem;
      padding: 0.75rem 1.4rem;
      background: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: var(--radius-lg);
      cursor: pointer; color: var(--text-secondary);
      transition: var(--tr);
      font-family: 'Heebo', sans-serif;
      min-width: 110px;
    }
    .ep-season-tab:hover { border-color: var(--tab-color, var(--accent)); color: var(--text-primary); }
    .ep-season-tab.active {
      border-color: var(--tab-color, var(--accent));
      background: rgba(255,255,255,0.06);
      color: var(--text-primary);
      box-shadow: 0 0 18px color-mix(in srgb, var(--tab-color) 30%, transparent);
    }
    .tab-icon { font-size: 1.5rem; }
    .tab-label { font-family: 'Orbitron', sans-serif; font-size: 0.65rem; letter-spacing: 0.1em; opacity: 0.7; }
    .tab-name { font-size: 0.8rem; font-weight: 700; }

    /* ── Season info banner ── */
    .season-info {
      display: flex; align-items: center; gap: 1.25rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem 1.5rem;
      margin-bottom: 2rem;
      transition: border-color 0.3s;
    }
    .season-info-icon { font-size: 2.8rem; flex-shrink: 0; }
    .season-info-title { font-family: 'Orbitron', sans-serif; font-size: 0.95rem; font-weight: 900; margin-bottom: 0.35rem; letter-spacing: 0.05em; }
    .season-info-sub { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.5; margin-bottom: 0.5rem; }
    .season-info-stats { display: flex; gap: 1rem; font-size: 0.8rem; color: var(--text-muted); }

    /* ── Episode grid ── */
    .episodes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
      gap: 1rem;
    }
    .ep-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: pointer;
      transition: var(--tr);
    }
    .ep-card:hover { border-color: var(--ep-color, var(--accent)); transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .ep-thumb {
      position: relative; width: 100%; aspect-ratio: 16/9;
      background: #0a0a1e; overflow: hidden;
    }
    .ep-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s; }
    .ep-card:hover .ep-thumb img { transform: scale(1.05); }
    .ep-play-btn {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.35);
      font-size: 1.6rem; opacity: 0; transition: opacity 0.25s;
      color: #fff;
    }
    .ep-card:hover .ep-play-btn { opacity: 1; }
    .ep-num-badge {
      position: absolute; top: 6px; right: 6px;
      background: var(--accent);
      color: #fff; font-size: 0.68rem; font-weight: 800;
      padding: 0.15rem 0.5rem; border-radius: 6px;
      font-family: 'Orbitron', sans-serif; letter-spacing: 0.05em;
    }
    .ep-card-body { padding: 0.65rem 0.75rem; }
    .ep-card-title { font-size: 0.8rem; font-weight: 700; margin-bottom: 0.2rem; line-height: 1.3; }
    .ep-card-meta { font-size: 0.72rem; color: var(--text-secondary); }
    .ep-parts { display: flex; gap: 0.4rem; margin-top: 0.5rem; flex-wrap: wrap; }
    .ep-part-btn {
      flex: 1; min-width: 60px;
      padding: 0.35rem 0.6rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--btn-color, var(--accent));
      border-radius: 8px;
      color: var(--btn-color, var(--accent));
      font-size: 0.75rem; font-weight: 700;
      cursor: pointer; transition: var(--tr);
      font-family: 'Heebo', sans-serif;
    }
    .ep-part-btn:hover { background: var(--btn-color, var(--accent)); color: #fff; }

    /* ── Video player modal ── */
    .player-modal {
      position: fixed; inset: 0; z-index: 3000;
      background: rgba(0,0,0,0.92);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 1rem;
    }
    .player-modal.hidden { display: none; }
    .player-modal-inner {
      width: 100%; max-width: 960px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .player-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.9rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    .player-header-info { min-width: 0; }
    .player-title-text { font-size: 1rem; font-weight: 800; font-family: 'Orbitron', sans-serif; letter-spacing: 0.04em; }
    .player-season-tag { font-size: 0.78rem; color: var(--text-secondary); margin-top: 0.15rem; }
    .player-close {
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 8px; cursor: pointer;
      color: var(--text-secondary); font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: var(--tr); flex-shrink: 0;
    }
    .player-close:hover { background: rgba(255,102,0,0.15); color: var(--accent); }
    .player-video-wrap {
      position: relative; width: 100%;
      aspect-ratio: 16/9;
      background: #000;
    }
    #yt-ep-player, #yt-ep-player iframe, #yt-ep-inner {
      width: 100% !important; height: 100% !important;
      position: absolute; inset: 0;
      border: none;
    }
    .player-footer {
      padding: 0.65rem 1.25rem;
      font-size: 0.78rem; color: var(--text-muted);
      border-top: 1px solid var(--border);
      text-align: center;
    }

    @media (max-width: 600px) {
      .episodes-grid { grid-template-columns: repeat(2, 1fr); gap: 0.65rem; }
      .ep-season-tab { min-width: 80px; padding: 0.6rem 0.9rem; }
      .tab-name { font-size: 0.72rem; }
      .season-info { flex-direction: column; text-align: center; }
      .season-info-stats { justify-content: center; }
    }
  </style>
